  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

'woff2');\n  unicode-range: U+0370-0377, U+037A-037F, U+0384-038A, U+038C, U+038E-03A1, U+03A3-03FF;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"fe3f9772-4712-4f8d-85f3-24ae49c167eb\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"9208ae7e-91f7-42d9-8a14-18ab3b54cc15\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"6f7cc539-181f-4911-a0f1-230e576e0952\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root {\n  /* ===========================================================\n     TYPE FAMILIES\n     =========================================================== */\n  --font-sans: \"Inter\", system-ui, -apple-system, \"Helvetica Neue\", Arial, sans-serif;\n  --font-display: \"Inter\", system-ui, sans-serif; /* used at light weights for big display */\n  --font-mono: \"Fira Code\", ui-monospace, \"SF Mono\", Menlo, \"Consolas\", monospace;\n\n  /* Weights — display headlines & big stats run LIGHT, that is the signature */\n  --w-light: 300;       /* @kind font */\n  --w-regular: 400;     /* @kind font */\n  --w-medium: 500;      /* @kind font */\n  --w-semibold: 600;    /* @kind font */\n  --w-bold: 700;        /* @kind font */\n  --w-extrabold: 800;   /* @kind font */\n\n  /* ===========================================================\n     CORE NEUTRALS  (ink on paper)\n     =========================================================== */\n  --ink:        #1a1a1a;   /* primary text — soft black, not pure */\n  --ink-true:   #000000;   /* pure black: rules, big stats, hero type */\n  --fg-1:       #1a1a1a;   /* primary foreground */\n  --fg-2:       #4d4d4d;   /* secondary text, captions */\n  --fg-3:       #767676;   /* tertiary / metadata / survey-question labels */\n  --fg-4:       #a6a6a6;   /* disabled, faint */\n\n  --paper:      #ffffff;   /* primary page */\n  --paper-warm: #f4f0ea;   /* warm cream alternate page / callout panels */\n  --paper-cool: #f3f9fb;   /* cool tinted panel (pairs with teal) */\n  --surface-1:  #ffffff;\n  --surface-2:  #f6f6f4;   /* subtle gray panel */\n  --surface-3:  #ececea;\n\n  --line:       #e3e3e0;   /* hairlines, dividers */\n  --line-strong:#000000;   /* the heavy editorial rule above/below stats */\n\n  /* ===========================================================\n     SIGNAL HIGHLIGHTERS  (the headline marker bars)\n     Manuelkpro's ownable bright pairing — citrus + aqua. Painted\n     behind headline phrases like a marker; black text on top.\n     =========================================================== */\n  --signal-1:  #ffe03a;  /* CITRUS YELLOW — primary highlighter */\n  --signal-2:  #2ee6ce;  /* AQUA MINT — secondary highlighter */\n  --signal-3:  #ff5ca0;  /* HOT PINK — emphasis / rare third */\n  --signal-1-ink: #1a1a1a;\n  --signal-2-ink: #1a1a1a;\n  /* back-compat aliases (old names → new values) */\n  --signal-lime:     var(--signal-1);\n  --signal-cyan:     var(--signal-2);\n  --signal-lime-ink: var(--signal-1-ink);\n  --signal-cyan-ink: var(--signal-2-ink);\n\n  /* ===========================================================\n     BRAND ACCENTS  — electric indigo + magenta\n     Indigo carries section labels / eyebrows / links; magenta is\n     the punchy secondary. (Replaces the old teal + purple.)\n     =========================================================== */\n  --accent:        #4f2deb;  /* ELECTRIC INDIGO — labels, eyebrows, links */\n  --accent-bright: #2f6bff;  /* COBALT — brighter indigo for hovers/links */\n  --accent-2:      #ff2d8e;  /* MAGENTA — secondary accent */\n  --accent-deep:   #2c179e;  /* deep indigo for dark surfaces */\n  /* aliases */\n  --teal:        var(--accent);\n  --teal-bright: var(--accent-bright);\n  --teal-deep:   var(--accent-deep);\n  --purple:      var(--accent);\n  --purple-light:#9b7bff;\n\n  /* ===========================================================\n     DATA-VIZ SPECTRUM  (radial / multi-series charts)\n     Bright, saturated, ownable — magenta→coral→amber→citrus→\n     aqua→cobalt→indigo. Warm to cool.\n     =========================================================== */\n  --viz-magenta: #ff2d8e;\n  --viz-coral:   #ff6a3d;\n  --viz-amber:   #ffb020;\n  --viz-citrus:  #ffe03a;\n  --viz-aqua:    #2ee6ce;\n  --viz-cobalt:  #2f6bff;\n  --viz-indigo:  #5b2eeb;\n  /* aliases to legacy names still used in code */\n  --viz-purple: var(--viz-indigo);\n  --viz-violet: var(--viz-magenta);\n  --viz-blue:   var(--viz-cobalt);\n  --viz-cyan:   var(--viz-aqua);\n  --viz-teal:   var(--viz-aqua);\n  --viz-green:  var(--viz-coral);\n  --viz-lime:   var(--viz-citrus);\n  --viz-gold:   var(--viz-amber);\n  --viz-orange: var(--viz-coral);\n  --viz-rust:   var(--viz-coral);\n  /* sequential single-series ramp (donuts): indigo */\n  --viz-p-1: #ece7fd;\n  --viz-p-2: #9b7bff;\n  --viz-p-3: #6b46ec;\n  --viz-p-4: #4f2deb;\n  --donut-light: #9b7bff;  /* two-tone donut: \"somewhat\" */\n  --donut-deep:  #4f2deb;  /* two-tone donut: \"strong\" */\n  --viz-track: #eceaf6;    /* the empty/\"rest\" ring (lavender-tinted) */\n\n  /* semantic status (sparing use) */\n  --pos: #1fa463;\n  --neg: #d64545;\n  --warn:#e8a13a;\n\n  /* ===========================================================\n     RADII  — editorial system is mostly SQUARE.\n     Cards/panels use small radius; chart fills are square-ended.\n     =========================================================== */\n  --r-0: 0px;\n  --r-sm: 4px;\n  --r-md: 8px;\n  --r-lg: 14px;     /* the big white content cards (Delegation) */\n  --r-pill: 999px;\n\n  /* ===========================================================\n     SHADOWS / ELEVATION  — soft, diffuse, neutral. No tints.\n     =========================================================== */\n  --shadow-sm: 0 1px 2px rgba(0,0,0,.06), 0 1px 3px rgba(0,0,0,.08);\n  --shadow-md: 0 4px 14px rgba(0,0,0,.08), 0 2px 6px rgba(0,0,0,.06);\n  --shadow-lg: 0 18px 48px rgba(0,0,0,.12), 0 6px 16px rgba(0,0,0,.08);\n\n  /* ===========================================================\n     SPACING  — 4px base scale\n     =========================================================== */\n  --s-1: 4px;\n  --s-2: 8px;\n  --s-3: 12px;\n  --s-4: 16px;\n  --s-5: 24px;\n  --s-6: 32px;\n  --s-7: 48px;\n  --s-8: 64px;\n  --s-9: 96px;\n  --s-10: 128px;\n\n  /* container widths for one-pagers / report columns */\n  --col-text: 62ch;       /* comfortable measure for body */\n  --page-w: 816px;        /* US-Letter @96dpi width */\n  --page-margin: 72px;\n}\n\n/* ============================================================\n   SEMANTIC ELEMENT STYLES\n   Apply via classes or element selectors inside report bodies.\n   ============================================================ */\n\n.mk-hero {            /* the giant cover headline, e.g. \"AI at Work Is Here\" */\n  font-family: var(--font-display);\n  font-weight: var(--w-light);\n  font-size: clamp(48px, 7vw, 104px);\n  line-height: 0.98;\n  letter-spacing: -0.015em;\n  color: var(--ink-true);\n  text-wrap: balance;\n}\n\n.mk-h1 {\n  font-family: var(--font-display);\n  font-weight: var(--w-light);\n  font-size: clamp(34px, 4.4vw, 60px);\n  line-height: 1.04;\n  letter-spacing: -0.01em;\n  color: var(--ink-true);\n  text-wrap: balance;\n}\n\n.mk-h2 {\n  font-family: var(--font-sans);\n  font-weight: var(--w-semibold);\n  font-size: 28px;\n  line-height: 1.15;\n  letter-spacing: -0.005em;\n  color: var(--ink);\n}\n\n.mk-h3 {\n  font-family: var(--font-sans);\n  font-weight: var(--w-semibold);\n  font-size: 20px;\n  line-height: 1.25;\n  color: var(--ink);\n}\n\n/* eyebrow / section label — teal, all-caps, tracked (e.g. \"LOOKS LIKE\", \"Finding 1\") */\n.mk-eyebrow {\n  font-family: var(--font-sans);\n  font-weight: var(--w-bold);\n  font-size: 13px;\n  line-height: 1;\n  letter-spacing: 0.12em;\n  text-transform: uppercase;\n  color: var(--fg-3);\n}\n.mk-eyebrow--teal { color: var(--teal); }\n\n/* the colored section heading (e.g. \"Delegation\" in teal) */\n.mk-section-title {\n  font-family: var(--font-sans);\n  font-weight: var(--w-bold);\n  font-size: 34px;\n  line-height: 1.05;\n  color: var(--teal);\n}\n\n.mk-body {\n  font-family: var(--font-sans);\n  font-weight: var(--w-regular);\n  font-size: 17px;\n  line-height: 1.6;\n  color: var(--fg-1);\n  max-width: var(--col-text);\n}\n.mk-body--lead {        /* deck/lead paragraph under a hero */\n  font-size: 22px;\n  line-height: 1.45;\n  font-weight: var(--w-regular);\n}\n\n.mk-caption {           /* survey question labels, figure notes */\n  font-family: var(--font-sans);\n  font-weight: var(--w-regular);\n  font-size: 13px;\n  line-height: 1.45;\n  color: var(--fg-3);\n}\n\n.mk-byline {            /* \"By Jared Spataro …\" / dates */\n  font-family: var(--font-sans);\n  font-weight: var(--w-bold);\n  font-size: 14px;\n  color: var(--ink);\n}\n\n/* the signature BIG STAT number, e.g. 85%  87%  75% */\n.mk-stat {\n  font-family: var(--font-display);\n  font-weight: var(--w-light);\n  font-size: clamp(72px, 12vw, 168px);\n  line-height: 0.9;\n  letter-spacing: -0.02em;\n  color: var(--ink-true);\n  font-variant-numeric: lining-nums;\n}\n\n/* pull-quote */\n.mk-quote {\n  font-family: var(--font-display);\n  font-weight: var(--w-light);\n  font-size: 30px;\n  line-height: 1.3;\n  letter-spacing: -0.01em;\n  color: var(--ink);\n}\n\n.mk-mono {\n  font-family: var(--font-mono);\n  font-size: 13px;\n  letter-spacing: 0;\n}\n\n/* ---- THE HIGHLIGHTER MARK -------------------------------------\n   Wrap headline phrases to get the marker-bar effect. The mark\n   hugs the text with a little horizontal padding and NO rounding.\n----------------------------------------------------------------- */\n.mk-mark {\n  background: var(--signal-lime);\n  color: var(--signal-lime-ink);\n  padding: 0.04em 0.12em;\n  box-decoration-break: clone;\n  -webkit-box-decoration-break: clone;\n}\n.mk-mark--cyan { background: var(--signal-cyan); }\n\n/* ---- heavy editorial rule (above/below big stats) -------------- */\n.mk-rule {\n  border: none;\n  border-top: 2px solid var(--line-strong);\n  margin: 0;\n}\n<\u002Fstyle>\n<script src=\"0ffdabde-f959-4418-a00e-aead6437db5b\"><\u002Fscript>\n<style>\n  @keyframes mkFlow { to { stroke-dashoffset: -48; } }\n  @keyframes mkHubPulse { 0%,100% { box-shadow: 0 0 0 14px rgba(255,255,255,0.55), var(--shadow-lg); } 50% { box-shadow: 0 0 0 20px rgba(79,45,235,0.10), var(--shadow-lg); } }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n\n\n<div style=\"position:relative;width:100%;font-family:var(--font-sans);background:transparent;\" ref=\"{{ rootRef }}\">\n\n<sc-if value=\"{{ isDesktop }}\" hint-placeholder-val=\"{{ true }}\">\n<div id=\"loopRootWrap\" style=\"width:100%;height:{{ desktopScaledHeight }}px;position:relative;overflow:hidden;\">\n<div style=\"position:absolute;left:50%;top:0;width:1360px;transform:translateX(-50%) scale({{ desktopScale }});transform-origin:top center;\">\n<div id=\"loopRoot\" style=\"width:1360px;height:1150px;position:relative;font-family:var(--font-sans);overflow:hidden;background:transparent;\">\n\n  <!-- ===== TITLE BLOCK ===== -->\n  <div style=\"position:absolute;left:64px;top:40px;width:480px;z-index:6;\">\n    <div class=\"mk-eyebrow\" style=\"color:var(--accent);margin-bottom:10px;font-size:12px;letter-spacing:0.11em;\">THE OPERATING LOOP<\u002Fdiv><div class=\"js-title\" style=\"font-family: var(--font-display); font-weight: var(--w-regular); font-size: 43.7px; line-height: 1.12; letter-spacing: -0.01em; color: var(--ink-true); cursor: default; width: 564px\">Transitioning to the new AI design process — \"One <span class=\"js-title-hl\" style=\"background: rgb(255, 224, 58); padding: 1px 6px; margin: 0px -6px; transition: background 0.15s; box-decoration-break: clone; -webkit-box-decoration-break: clone; color: rgb(20, 20, 20);\">continuous loop,<\u002Fspan> not a linear handoff.\"<\u002Fdiv>\n    \n  <\u002Fdiv>\n\n  <!-- ===== LEGEND (top right) ===== -->\n  <div style=\"position:absolute;right:64px;top:40px;display:flex;flex-direction:column;align-items:flex-end;gap:12px;z-index:6;\">\n    <div style=\"display:flex;align-items:center;gap:12px;\">\n      <div style=\"width:34px;height:6px;border-radius:3px;background:linear-gradient(90deg,#4f2deb,#2f6bff,#ff2d8e);flex:none;\"><\u002Fdiv>\n      <div style=\"font-family:var(--font-sans);font-size:13px;color:var(--fg-1);white-space:nowrap;padding:1px 5px;margin:0 -5px;border-radius:2px;transition:background .15s ease;cursor:default;\" style-hover=\"background:#FFE03A;color:#141414;\">AI tools (LLM's or Agents)<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:12px;\">\n      <span style=\"width:34px;display:flex;justify-content:center;flex:none;color:var(--fg-2);\"><svg viewBox=\"0 0 24 24\" width=\"18\" height=\"18\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"8.5\" r=\"3.8\"><\u002Fcircle><path d=\"M4.5 20.5c0-4.2 3.4-7 7.5-7s7.5 2.8 7.5 7\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n      <div style=\"font-family:var(--font-sans);font-size:13px;color:var(--fg-1);white-space:nowrap;padding:1px 5px;margin:0 -5px;border-radius:2px;transition:background .15s ease;cursor:default;\" style-hover=\"background:#FFE03A;color:#141414;\">Role: Designer, Engineer, PM or <br>others can contribute<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== DIAGRAM (offset down for breathing room under title/legend) ===== -->\n  <div style=\"position:absolute;left:0;top:120px;width:1360px;height:1000px;\">\n\n  <!-- ===== RIBBON / CONNECTOR LAYER ===== -->\n  <svg width=\"1360\" height=\"1000\" viewBox=\"0 0 1360 1000\" style=\"position:absolute;left:0;top:0;z-index:0;pointer-events:none;overflow:visible;\">\n    <defs>\n      <linearGradient id=\"lg1\" gradientUnits=\"userSpaceOnUse\" x1=\"680\" y1=\"205\" x2=\"956\" y2=\"405\"><stop offset=\"0\" stop-color=\"#4f2deb\"><\u002Fstop><stop offset=\"1\" stop-color=\"#2f6bff\"><\u002Fstop><\u002FlinearGradient>\n      <linearGradient id=\"lg2\" gradientUnits=\"userSpaceOnUse\" x1=\"956\" y1=\"405\" x2=\"851\" y2=\"730\"><stop offset=\"0\" stop-color=\"#2f6bff\"><\u002Fstop><stop offset=\"1\" stop-color=\"#7b5cff\"><\u002Fstop><\u002FlinearGradient>\n      <linearGradient id=\"lg3\" gradientUnits=\"userSpaceOnUse\" x1=\"851\" y1=\"730\" x2=\"509\" y2=\"730\"><stop offset=\"0\" stop-color=\"#7b5cff\"><\u002Fstop><stop offset=\"1\" stop-color=\"#ff2d8e\"><\u002Fstop><\u002FlinearGradient>\n      <linearGradient id=\"lg4\" gradientUnits=\"userSpaceOnUse\" x1=\"509\" y1=\"730\" x2=\"404\" y2=\"405\"><stop offset=\"0\" stop-color=\"#ff2d8e\"><\u002Fstop><stop offset=\"1\" stop-color=\"#9b7bff\"><\u002Fstop><\u002FlinearGradient>\n      <linearGradient id=\"lg5\" gradientUnits=\"userSpaceOnUse\" x1=\"404\" y1=\"405\" x2=\"680\" y2=\"205\"><stop offset=\"0\" stop-color=\"#9b7bff\"><\u002Fstop><stop offset=\"1\" stop-color=\"#4f2deb\"><\u002Fstop><\u002FlinearGradient>\n    <\u002Fdefs>\n\n    <!-- soft halo underlay -->\n    <g class=\"js-halo\" fill=\"none\" stroke-linecap=\"round\" opacity=\"0.16\" style=\"transition:opacity .25s ease;\">\n      <path d=\"M680,205 A290,290 0 0,1 956,405\" stroke=\"url(#lg1)\" stroke-width=\"40\"><\u002Fpath>\n      <path d=\"M956,405 A290,290 0 0,1 851,730\" stroke=\"url(#lg2)\" stroke-width=\"40\"><\u002Fpath>\n      <path d=\"M851,730 A290,290 0 0,1 509,730\" stroke=\"url(#lg3)\" stroke-width=\"40\"><\u002Fpath>\n      <path d=\"M509,730 A290,290 0 0,1 404,405\" stroke=\"url(#lg4)\" stroke-width=\"40\"><\u002Fpath>\n      <path d=\"M404,405 A290,290 0 0,1 680,205\" stroke=\"url(#lg5)\" stroke-width=\"40\"><\u002Fpath>\n    <\u002Fg>\n    <!-- main ribbons -->\n    <g fill=\"none\" stroke-linecap=\"round\">\n      <path class=\"js-ribbon\" pathLength=\"1\" stroke-dasharray=\"1\" stroke-dashoffset=\"0\" d=\"M680,205 A290,290 0 0,1 956,405\" stroke=\"url(#lg1)\" stroke-width=\"22\" style=\"transition:opacity .25s ease, stroke-width .25s ease, stroke-dashoffset .6s ease;\"><\u002Fpath>\n      <path class=\"js-ribbon\" pathLength=\"1\" stroke-dasharray=\"1\" stroke-dashoffset=\"0\" d=\"M956,405 A290,290 0 0,1 851,730\" stroke=\"url(#lg2)\" stroke-width=\"22\" style=\"transition:opacity .25s ease, stroke-width .25s ease, stroke-dashoffset .6s ease;\"><\u002Fpath>\n      <path class=\"js-ribbon\" pathLength=\"1\" stroke-dasharray=\"1\" stroke-dashoffset=\"0\" d=\"M851,730 A290,290 0 0,1 509,730\" stroke=\"url(#lg3)\" stroke-width=\"22\" style=\"transition:opacity .25s ease, stroke-width .25s ease, stroke-dashoffset .6s ease;\"><\u002Fpath>\n      <path class=\"js-ribbon\" pathLength=\"1\" stroke-dasharray=\"1\" stroke-dashoffset=\"0\" d=\"M509,730 A290,290 0 0,1 404,405\" stroke=\"url(#lg4)\" stroke-width=\"22\" style=\"transition:opacity .25s ease, stroke-width .25s ease, stroke-dashoffset .6s ease;\"><\u002Fpath>\n      <path class=\"js-ribbon\" pathLength=\"1\" stroke-dasharray=\"1\" stroke-dashoffset=\"0\" d=\"M404,405 A290,290 0 0,1 680,205\" stroke=\"url(#lg5)\" stroke-width=\"22\" style=\"transition:opacity .25s ease, stroke-width .25s ease, stroke-dashoffset .6s ease;\"><\u002Fpat ursor:pointer;transition:opacity .5s ease, transform .5s ease;\">\n    <div class=\"mk-eyebrow\" style=\"color:var(--fg-3);margin-bottom:5px;\">STAGE THREE<\u002Fdiv>\n    <div class=\"mk-h3\" style=\"font-size: 22px; font-weight: 400; transition: color .2s ease\">Refine in context<\u002Fdiv>\n    <div class=\"mk-body\" style=\"font-size:14px;margin-top:6px;color:var(--fg-2);max-width:none;\"><span class=\"js-hl\" style=\"transition:background .2s ease, color .2s ease;padding:1px 5px;margin:0 -5px;box-decoration-break:clone;-webkit-box-decoration-break:clone;\">States, comments, sliders, taste<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n  <!-- 4 left lower -->\n  <div class=\"js-label\" style=\"position:absolute;left:150px;top:740px;width:300px;text-align:right;z-index:3;cursor:pointer;transition:opacity .5s ease, transform .5s ease;\">\n    <div class=\"mk-eyebrow\" style=\"color:var(--fg-3);margin-bottom:5px;\">STAGE FOUR<\u002Fdiv>\n    <div class=\"mk-h3\" style=\"font-size:22px;font-weight:var(--w-bold);transition:color .2s ease;\"><span style=\"font-weight: normal;\">Validate<\u002Fspan> <span style=\"font-weight: var(--w-regular); color: var(--fg-3); font-size: 15px;\">·<\u002Fspan><\u002Fdiv>\n    <div class=\"mk-body\" style=\"font-size:14px;margin-top:6px;color:var(--fg-2);max-width:none;\"><span class=\"js-hl\" style=\"transition:background .2s ease, color .2s ease;padding:1px 5px;margin:0 -5px;box-decoration-break:clone;-webkit-box-decoration-break:clone;\">Share a link, user-test live<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n  <!-- 5 left upper -->\n  <div class=\"js-label\" style=\"position:absolute;left:48px;top:360px;width:300px;text-align:right;z-index:3;cursor:pointer;transition:opacity .5s ease, transform .5s ease;\">\n    <div class=\"mk-eyebrow\" style=\"color:var(--fg-3);margin-bottom:5px;\">STAGE FIVE<\u002Fdiv>\n    <div class=\"mk-h3\" style=\"font-size:22px;font-weight:var(--w-bold);transition:color .2s ease;\"><span style=\"font-weight: normal;\">Handoff <span style=\"color: var(--accent-2);\">=<\u002Fspan> continuation<\u002Fspan><\u002Fdiv>\n    <div class=\"mk-body\" style=\"font-size:14px;margin-top:6px;color:var(--fg-2);max-width:none;\"><span class=\"js-hl\" style=\"transition:background .2s ease, color .2s ease;padding:1px 5px;margin:0 -5px;box-decoration-break:clone;-webkit-box-decoration-break:clone;\">Bundle to Claude Code, build on it<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<sc-if value=\"{{ isMobile }}\" hint-placeholder-val=\"{{ false }}\">\n<div style=\"width:100%;max-width:430px;margin:0 auto;padding:32px 22px 44px;box-sizing:border-box;position:relative;font-family:var(--font-sans);background:transparent;\">\n\n  <!-- ===== TITLE BLOCK (mobile) ===== -->\n  <div style=\"margin-bottom:32px;\">\n    <div class=\"mk-eyebrow\" style=\"color:var(--accent);margin-bottom:9px;font-size:11px;letter-spacing:0.11em;\">THE OPERATING LOOP<\u002Fdiv>\n    <div class=\"js-title\" style=\"font-family:var(--font-display);font-weight:var(--w-regular);font-size:34.5px;line-height:1.16;letter-spacing:-0.01em;color:var(--ink-true);cursor:default;\">Now transitioning to the new AI design process — \"One <span class=\"js-title-hl\" style=\"background:transparent;padding:1px 5px;margin:0 -5px;transition:background .15s ease;box-decoration-break:clone;-webkit-box-decoration-break:clone;\">continuous loop,<\u002Fspan> not a linear handoff.\"<\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== COMPACT LOOP MAP (hub + all 5 stages in one glance; tap a node or a row below) ===== -->\n  <div style=\"display:flex;justify-content:center;margin-bottom:6px;\">\n    <svg width=\"230\" height=\"230\" viewBox=\"0 0 240 240\" style=\"overflow:visible;\">\n      <g fill=\"none\" stroke-linecap=\"round\">\n        <path d=\"M120,25 A95,95 0 0,1 210.3,90.6\" stroke=\"#4f2deb\" stroke-width=\"{{ seg1Width }}\" opacity=\"{{ seg1Opacity }}\" style=\"transition:opacity .2s ease, stroke-width .2s ease;\"><\u002Fpath>\n        <path d=\"M210.3,90.6 A95,95 0 0,1 175.9,196.9\" stroke=\"#2f6bff\" stroke-width=\"{{ seg2Width }}\" opacity=\"{{ seg2Opacity }}\" style=\"transition:opacity .2s ease, stroke-width .2s ease;\"><\u002Fpath>\n        <path d=\"M175.9,196.9 A95,95 0 0,1 64.1,196.9\" stroke=\"#7b5cff\" stroke-width=\"{{ seg3Width }}\" opacity=\"{{ seg3Opacity }}\" style=\"transition:opacity .2s ease, stroke-width .2s ease;\"><\u002Fpath>\n        <path d=\"M64.1,196.9 A95,95 0 0,1 29.7,90.6\" stroke=\"#ff2d8e\" stroke-width=\"{{ seg4Width }}\" opacity=\"{{ seg4Opacity }}\" style=\"transition:opacity .2s ease, stroke-width .2s ease;\"><\u002Fpath>\n        <path d=\"M29.7,90.6 A95,95 0 0,1 120,25\" stroke=\"#9b7bff\" stroke-width=\"{{ seg5Width }}\" opacity=\"{{ seg5Opacity }}\" style=\"transition:opacity .2s ease, stroke-width .2s ease;\"><\u002Fpath>\n      <\u002Fg>\n      <circle cx=\"120\" cy=\"120\" r=\"52\" fill=\"#fff\" stroke=\"#E3E3E0\" stroke-width=\"1.5\" onclick=\"{{ clearActiveMobile }}\" style=\"cursor:pointer;\"><\u002Fcircle>\n      <text x=\"120\" y=\"115\" text-anchor=\"middle\" font-family=\"var(--font-display)\" font-weight=\"300\" font-size=\"12\" fill=\"var(--ink-true)\" style=\"pointer-events:none;\">Code<\u002Ftext>\n      <text x=\"120\" y=\"129\" text-anchor=\"middle\" font-family=\"var(--font-display)\" font-weight=\"300\" font-size=\"12\" fill=\"var(--ink-true)\" style=\"pointer-events:none;\">Repo<\u002Ftext>\n\n      <g onclick=\"{{ node1OnClick }}\" style=\"cursor:pointer;\">\n        <circle cx=\"120\" cy=\"25\" r=\"{{ node1R }}\" fill=\"#4f2deb\" opacity=\"{{ node1Opacity }}\" style=\"transition:r .2s ease, opacity .2s ease;\"><\u002Fcircle>\n        <text x=\"120\" y=\"30\" text-anchor=\"middle\" font-size=\"13\" fill=\"#fff\" font-weight=\"600\" opacity=\"{{ node1Opacity }}\" style=\"pointer-events:none;transition:opacity .2s ease;\">1<\u002Ftext>\n      <\u002Fg>\n      <g onclick=\"{{ node2OnClick }}\" style=\"cursor:pointer;\">\n        <circle cx=\"210.3\" cy=\"90.6\" r=\"{{ node2R }}\" fill=\"#2f6bff\" opacity=\"{{ node2Opacity }}\" style=\"transition:r .2s ease, opacity .2s ease;\"><\u002Fcircle>\n        <text x=\"210.3\" y=\"95.6\" text-anchor=\"middle\" font-size=\"13\" fill=\"#fff\" font-weight=\"600\" opacity=\"{{ node2Opacity }}\" style=\"pointer-events:none;transition:opacity .2s ease;\">2<\u002Ftext>\n      <\u002Fg>\n      <g onclick=\"{{ node3OnClick }}\" style=\"cursor:pointer;\">\n        <circle cx=\"175.9\" cy=\"196.9\" r=\"{{ node3R }}\" fill=\"#7b5cff\" opacity=\"{{ node3Opacity }}\" style=\"transition:r .2s ease, opacity .2s ease;\"><\u002Fcircle>\n        <text x=\"175.9\" y=\"201.9\" text-anchor=\"middle\" font-size=\"13\" fill=\"#fff\" font-weight=\"600\" opacity=\"{{ node3Opacity }}\" style=\"pointer-events:none;transition:opacity .2s ease;\">3<\u002Ftext>\n      <\u002Fg>\n      <g onclick=\"{{ node4OnClick }}\" style=\"cursor:pointer;\">\n        <circle cx=\"64.1\" cy=\"196.9\" r=\"{{ node4R }}\" fill=\"#ff2d8e\" opacity=\"{{ node4Opacity }}\" style=\"transition:r .2s ease, opacity .2s ease;\"><\u002Fcircle>\n        <text x=\"64.1\" y=\"201.9\" text-anchor=\"middle\" font-size=\"13\" fill=\"#fff\" font-weight=\"600\" opacity=\"{{ node4Opacity }}\" style=\"pointer-events:none;transition:opacity .2s ease;\">4<\u002Ftext>\n      <\u002Fg>\n      <g onclick=\"{{ node5OnClick }}\" style=\"cursor:pointer;\">\n        <circle cx=\"29.7\" cy=\"90.6\" r=\"{{ node5R }}\" fill=\"#9b7bff\" opacity=\"{{ node5Opacity }}\" style=\"transition:r .2s ease, opacity .2s ease;\"><\u002Fcircle>\n        <text x=\"29.7\" y=\"95.6\" text-anchor=\"middle\" font-size=\"13\" fill=\"#fff\" font-weight=\"600\" opacity=\"{{ node5Opacity }}\" style=\"pointer-events:none;transition:opacity .2s ease;\">5<\u002Ftext>\n      <\u002Fg>\n    <\u002Fsvg>\n  <\u002Fdiv>\n  <div style=\"display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:26px;\">\n    <svg viewBox=\"0 0 24 24\" width=\"13\" height=\"13\" fill=\"none\" stroke=\"var(--fg-3)\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 12a9 9 0 1 1 3 6.7\"><\u002Fpath><path d=\"M3 17v-5h5\"><\u002Fpath><\u002Fsvg>\n    <div class=\"mk-caption\" style=\"color:var(--fg-3);font-size:11px;\">Tap a stage — 5 cycles back into 1<\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== HUB CAPTION ===== -->\n  <div class=\"mk-caption\" style=\"text-align:center;color:var(--fg-2);max-width:280px;margin:0 auto 28px;\">Design system components in the Code Repository, sharpened every pass.<\u002Fdiv>\n\n  <!-- ===== STAGE DETAIL ROWS (numbers/colors match the map above) ===== -->\n  <div style=\"display:flex;flex-direction:column;gap:6px;margin-bottom:28px;\">\n    <sc-for list=\"{{ stagesMobile }}\" as=\"st\" hint-placeholder-count=\"5\">\n      <div onclick=\"{{ st.onClick }}\" style=\"border-radius:14px;padding:10px 12px;background:{{ st.rowBg }};transition:background .2s ease;cursor:pointer;\">\n        <div style=\"display:grid;grid-template-columns:auto 1fr;gap:12px;align-items:flex-start;\">\n          <div style=\"width:34px;height:34px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;font-weight:var(--w-regular);box-shadow:var(--shadow-sm);background:{{ st.color }};transform:{{ st.numScale }};transition:transform .2s ease;\">{{ st.n }}<\u002Fdiv>\n          <div>\n            <div class=\"mk-eyebrow\" style=\"color:var(--fg-3);font-size:9.5px;\">{{ st.eyebrow }}<\u002Fdiv>\n            <div class=\"mk-h3\" style=\"font-size:15px;font-weight:var(--w-bold);margin-top:1px;\">{{ st.title }}<\u002Fdiv>\n            <div class=\"mk-body\" style=\"font-size:12.5px;color:var(--fg-2);margin-top:2px;\">{{ st.caption }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <sc-if value=\"{{ st.isActive }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:flex;flex-wrap:wrap;gap:6px;margin:10px 0 2px 46px;\">\n            <sc-for list=\"{{ st.tools }}\" as=\"tool\" hint-placeholder-count=\"2\">\n              <span style=\"display:inline-flex;align-items:center;height:22px;padding:0 9px;border-radius:11px;border:1px solid {{ tool.border }};background:{{ tool.bg }};font-size:10.5px;font-weight:600;color:{{ tool.color }};white-space:nowrap;\">{{ tool.name }}<\u002Fspan>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n\n  <!-- ===== CLOSES THE LOOP (text note, no shape) ===== -->\n  <div style=\"display:flex;align-items:center;justify-content:center;gap:8px;margin-top:6px;\">\n    <svg viewBox=\"0 0 24 24\" width=\"14\" height=\"14\" fill=\"none\" stroke=\"var(--fg-3)\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 12a9 9 0 1 1 3 6.7\"><\u002Fpath><path d=\"M3 17v-5h5\"><\u002Fpath><\u002Fsvg>\n    <div class=\"mk-caption\" style=\"color:var(--fg-3);\">Cycles back to Stage One<\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== FOOTER LEGEND (mobile) ===== -->\n  <div style=\"position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:10px;margin-top:32px;\">\n    <div style=\"display:flex;align-items:center;gap:10px;\">\n      <div style=\"width:24px;height:4px;border-radius:2px;background:linear-gradient(90deg,#4f2deb,#2f6bff,#ff2d8e);flex:none;\"><\u002Fdiv>\n      <div style=\"font-family:var(--font-sans);font-size:11px;color:var(--fg-2);padding:1px 5px;margin:0 -5px;border-radius:2px;transition:background .15s ease;cursor:default;\" style-hover=\"background:#FFE03A;color:#141414;\">AI tools (LLM's or Agents)<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:10px;\">\n      <svg viewBox=\"0 0 24 24\" width=\"16\" height=\"16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"color:var(--fg-2);flex:none;\"><circle cx=\"12\" cy=\"8.5\" r=\"3.8\"><\u002Fcircle><path d=\"M4.5 20.5c0-4.2 3.4-7 7.5-7s7.5 2.8 7.5 7\"><\u002Fpath><\u002Fsvg>\n      <div style=\"font-family:var(--font-sans);font-size:11px;color:var(--fg-2);padding:1px 5px;margin:0 -5px;border-radius:2px;transition:background .15s ease;cursor:default;\" style-hover=\"background:#FFE03A;color:#141414;\">Role: Designer, Engineer, PM or others<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1360,&quot;height&quot;:1150},&quot;showHubLinks&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Diagram&quot;},&quot;showArrows&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Diagram&quot;},&quot;animateFlow&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Diagram&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    isMobileAuto: (typeof window !== 'undefined' && window.innerWidth < 760),\n    desktopScale: 1,\n    activeMobile: null\n  };\n\n  static NODE_POS = [\n    { cx: 120, cy: 25, ty: 30 },\n    { cx: 210.3, cy: 90.6, ty: 95.6 },\n    { cx: 175.9, cy: 196.9, ty: 201.9 },\n    { cx: 64.1, cy: 196.9, ty: 201.9 },\n    { cx: 29.7, cy: 90.6, ty: 95.6 }\n  ];\n  static SEG_D = [\n    \"M120,25 A95,95 0 0,1 210.3,90.6\",\n    \"M210.3,90.6 A95,95 0 0,1 175.9,196.9\",\n    \"M175.9,196.9 A95,95 0 0,1 64.1,196.9\",\n    \"M64.1,196.9 A95,95 0 0,1 29.7,90.6\",\n    \"M29.7,90.6 A95,95 0 0,1 120,25\"\n  ];\n  static COLORS = ['#4f2deb', '#2f6bff', '#7b5cff', '#ff2d8e', '#9b7bff'];\n  static STAGE_INFO = [\n    { eyebrow: 'STAGE ONE', title: 'Intent', caption: 'A framed problem, loaded context', tools: [{ name: 'FigJam', ai: false }, { name: 'Notion', ai: false }, { name: 'Claude', ai: true }] },\n    { eyebrow: 'STAGE TWO', title: 'Generate wide', caption: '10 directions, real components', tools: [{ name: 'Figma', ai: false }, { name: 'Claude', ai: true }] },\n    { eyebrow: 'STAGE THREE', title: 'Refine in context', caption: 'States, comments, sliders, taste', tools: [{ name: 'Claude Design', ai: true }, { name: 'Google Stitch', ai: false }] },\n    { eyebrow: 'STAGE FOUR', title: 'Validate', caption: 'Share a link, user-test live', tools: [{ name: 'Claude Design', ai: true }, { name: 'Google Stitch', ai: false }, { name: 'Maze', ai: false }, { name: 'UserTesting', ai: false }] },\n    { eyebrow: 'STAGE FIVE', title: 'Handoff = continuation', caption: 'Bundle to Claude Code, build on it', tools: [{ name: 'Figma Dev Mode', ai: false }, { name: 'Claude Design', ai: true }, { name: 'Google Stitch', ai: false }] }\n  ];\n\n  setActiveMobile = (n) => {\n    this.setState(s => ({ activeMobile: s.activeMobile === n ? null : n }));\n  };\n  clearActiveMobile = () => {\n    this.setState({ activeMobile: null });\n  };\n\n  renderVals() {\n    const hub = this.props.showHubLinks ?? true;\n    const arr = this.props.showArrows ?? true;\n    const flow = this.props.animateFlow ?? true;\n    const active = this.state.activeMobile;\n    const COLORS = Component.COLORS;\n\n    // Exposed as individual node1R / node1Opacity / node1OnClick ... (rather than an array\n    // consumed by sc-for) because interpolating text CONTENT inside an SVG <text> element\n    // gets wrapped in a <span>, which is invalid inside SVG and silently fails to render —\n    // so the stage numbers must stay as literal \"1\"..\"5\" in the template, with only\n    // ATTRIBUTES (r, opacity) driven by live holes.\n    const nodeVals = {};\n    Component.NODE_POS.forEach((p, i) => {\n      const n = i + 1;\n      const isActive = active === n;\n      const dim = !!active && !isActive;\n      nodeVals['node' + n + 'R'] = isActive ? 18 : 15;\n      nodeVals['node' + n + 'Opacity'] = dim ? 0.4 : 1;\n      nodeVals['node' + n + 'OnClick'] = () => this.setActiveMobile(n);\n    });\n\n    const segVals = {};\n    Component.SEG_D.forEach((d, i) => {\n      const n = i + 1;\n      let touchesActive = false;\n      if (active) {\n        const incoming = ((active - 2) + 5) % 5 + 1;\n        const outgoing = ((active - 1) + 5) % 5 + 1;\n        touchesActive = (n === incoming || n === outgoing);\n      }\n      segVals['seg' + n + 'Width'] = touchesActive ? 11 : 7;\n      segVals['seg' + n + 'Opacity'] = active ? (touchesActive ? 1 : 0.25) : 1;\n    });\n\n    const stagesMobile = Component.STAGE_INFO.map((s, i) => {\n      const n = i + 1;\n      const isActive = active === n;\n      return {\n        n, color: COLORS[i],\n        eyebrow: s.eyebrow, title: s.title, caption: s.caption,\n        isActive,\n        rowBg: isActive ? 'rgba(255,224,58,0.22)' : 'transparent',\n        numScale: isActive ? 'scale(1.12)' : 'scale(1)',\n        tools: s.tools.map(t => ({\n          name: t.name,\n          bg: t.ai ? 'var(--accent)' : '#fff',\n          color: t.ai ? '#fff' : 'var(--fg-2)',\n          border: t.ai ? 'var(--accent)' : '#E3E3E0'\n        })),\n        onClick: () => this.setActiveMobile(n)\n      };\n    });\n\n    return {\n      spokeOpacity: hub ? 0.3 : 0,\n      arrowOpacity: arr ? 1 : 0,\n      flowOpacity: flow ? 0.9 : 0,\n      isMobile: this.state.isMobileAuto,\n      isDesktop: !this.state.isMobileAuto,\n      desktopScale: this.state.desktopScale,\n      desktopScaledHeight: Math.round(1150 * this.state.desktopScale),\n      ...nodeVals, ...segVals, stagesMobile,\n      clearActiveMobile: this.clearActiveMobile\n    };\n  }\n\n  componentDidMount() {\n    this._onResize = () => {\n      const mobile = window.innerWidth < 760;\n      const wrapEl = document.getElementById('loopRootWrap');\n      const parentEl = wrapEl && wrapEl.parentElement;\n      // width comes from the layout column (so it never exceeds the embedding container);\n      // height comes from the viewport, so a short iframe (common on Wix) shrinks the whole\n      // diagram to fit both dimensions instead of only fitting width and overflowing vertically.\n      const availW = parentEl ? parentEl.clientWidth : window.innerWidth;\n      const availH = window.innerHeight;\n      const scale = Math.min(1, availW / 1360, availH / 1150);\n      if (mobile !== this.state.isMobileAuto || scale !== this.state.desktopScale) {\n        this.setState({ isMobileAuto: mobile, desktopScale: scale });\n      }\n    };\n    window.addEventListener('resize', this._onResize);\n    this._onResize();\n    // re-measure once layout has settled (fonts/iframe sizing can shift width after first paint)\n    setTimeout(this._onResize, 50);\n    setTimeout(this._onResize, 300);\n\n    // ---- hover focus, wired with EVENT DELEGATION on document instead of binding\n    // listeners to specific nodes once at mount. The diagram re-renders (resize settling,\n    // mobile state, etc.) can swap the underlying DOM elements; delegated listeners survive\n    // that because they re-query the live DOM on every event instead of holding stale\n    // references. This is what makes the hover-reveal of the tool chips reliable. ----\n    const CITRUS = '#FFE03A';\n    const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n    const stageOf = (el) => parseInt((el.textContent || '').trim(), 10);\n\n    const setActive = (n) => {\n      const markers = [...document.querySelectorAll('.js-marker')];\n      const labels = [...document.querySelectorAll('.js-label')];\n      const ribbons = [...document.querySelectorAll('.js-ribbon')];\n      const halo = document.querySelector('.js-halo');\n      const arrows = document.querySelector('.js-arrows');\n      const flow = document.querySelector('.js-flow');\n      const toolgroups = [...document.querySelectorAll('.js-toolgroup')];\n\n      markers.forEach(m => {\n        if (stageOf(m) === n) {\n          m.style.transform = 'translate(-50%,-50%) scale(1.16)';\n          m.style.boxShadow = 'var(--shadow-lg)';\n          m.style.opacity = '1';\n        } else { m.style.opacity = '0.3'; }\n      });\n      labels.forEach((l, i) => {\n        const h = l.querySelector('.mk-h3');\n        const hl = l.querySelector('.js-hl');\n        if (i + 1 === n) {\n          l.style.opacity = '1';\n          l.style.transform = 'translateY(-3px)';\n          if (h) h.style.color = 'var(--accent)';\n          if (hl) { hl.style.background = CITRUS; hl.style.color = '#141414'; }\n        } else { l.style.opacity = '0.3'; }\n      });\n      const incoming = (n - 2 + 5) % 5;\n      const outgoing = (n - 1 + 5) % 5;\n      ribbons.forEach((r, i) => {\n        if (i === incoming || i === outgoing) { r.style.opacity = '1'; r.setAttribute('stroke-width', '28'); }\n        else { r.style.opacity = '0.2'; }\n      });\n      if (halo) halo.style.opacity = '0';\n      if (arrows) arrows.style.opacity = '0.12';\n      if (flow) flow.style.opacity = '0';\n      toolgroups.forEach(tg => {\n        const isActive = parseInt(tg.dataset.stage, 10) === n;\n        tg.style.opacity = isActive ? '1' : '0';\n        tg.style.pointerEvents = isActive ? 'auto' : 'none';\n      });\n    };\n\n    const clearActive = () => {\n      const markers = [...document.querySelectorAll('.js-marker')];\n      const labels = [...document.querySelectorAll('.js-label')];\n      const ribbons = [...document.querySelectorAll('.js-ribbon')];\n      const halo = document.querySelector('.js-halo');\n      const arrows = document.querySelector('.js-arrows');\n      const flow = document.querySelector('.js-flow');\n      const toolgroups = [...document.querySelectorAll('.js-toolgroup')];\n\n      markers.forEach(m => {\n        m.style.transform = 'translate(-50%,-50%)';\n        m.style.boxShadow = 'var(--shadow-md)';\n        m.style.opacity = '1';\n      });\n      labels.forEach(l => {\n        const h = l.querySelector('.mk-h3');\n        const hl = l.querySelector('.js-hl');\n        l.style.opacity = '1';\n        l.style.transform = 'none';\n        if (h) h.style.color = '';\n        if (hl) { hl.style.background = 'transparent'; hl.style.color = ''; }\n      });\n      ribbons.forEach(r => { r.style.opacity = '1'; r.setAttribute('stroke-width', '22'); });\n      if (halo) halo.style.opacity = '';\n      if (arrows) arrows.style.opacity = '';\n      if (flow && !reduce) flow.style.opacity = '';\n      toolgroups.forEach(tg => { tg.style.opacity = '0'; tg.style.pointerEvents = 'none'; });\n    };\n\n    const labelIndex = (el) => [...document.querySelectorAll('.js-label')].indexOf(el);\n\n    document.addEventListener('mouseover', (e) => {\n      const t = e.target;\n      if (!t || !t.closest) return;\n      const m = t.closest('.js-marker');\n      if (m) { setActive(stageOf(m)); return; }\n      const l = t.closest('.js-label');\n      if (l) { const i = labelIndex(l); if (i >= 0) setActive(i + 1); return; }\n      const title = t.closest('.js-title');\n      if (title) {\n        const hl = title.querySelector('.js-title-hl');\n        if (hl) { hl.style.background = CITRUS; hl.style.color = '#141414'; }\n      }\n    });\n\n    document.addEventListener('mouseout', (e) => {\n      const t = e.target;\n      if (!t || !t.closest) return;\n      const rt = e.relatedTarget;\n      const stillInside = (sel) => rt && rt.closest && rt.closest(sel);\n      const m = t.closest('.js-marker');\n      if (m && !stillInside('.js-marker')) { clearActive(); return; }\n      const l = t.closest('.js-label');\n      if (l && !stillInside('.js-label')) { clearActive(); return; }\n      const title = t.closest('.js-title');\n      if (title && !stillInside('.js-title')) {\n        const hl = title.querySelector('.js-title-hl');\n        if (hl) { hl.style.background = 'transparent'; hl.style.color = ''; }\n      }\n    });\n\n    // Entrance is intentionally omitted. The base state is FULLY VISIBLE, so the diagram\n    // renders correctly in every context (screenshots, print / PDF / PPTX export,\n    // background-tab load) where the CSS animation clock may not advance. The living\n    // motion is safe and preserved: the continuous flow pulse and the hover-to-focus\n    // interaction (both non-critical to visibility).\n    if (reduce) {\n      const flow = document.querySelector('.js-flow');\n      if (flow) flow.style.animation = 'none';\n    }\n  }\n\n  componentWillUnmount() {\n    if (this._onResize) window.removeEventListener('resize', this._onResize);\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
